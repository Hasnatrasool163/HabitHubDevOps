<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitHub • Level Up Your Life</title>
<meta name="description" content="Gamified habit tracking — build streaks, earn XP, visualize progress.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-name">HabitHub</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-view="dashboard" id="nav-dashboard">
        <i class="bi bi-speedometer2"></i><span>Dashboard</span>
      </a>
      <a class="nav-item" data-view="habits" id="nav-habits">
        <i class="bi bi-list-check"></i><span>Habits</span>
      </a>
      <a class="nav-item" data-view="analytics" id="nav-analytics">
        <i class="bi bi-graph-up-arrow"></i><span>Analytics</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="xp-pill" id="totalXP">0 XP</div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn"><i class="bi bi-list"></i></button>
      <div class="topbar-quote" id="quoteText">Loading...</div>
      <div class="topbar-streak" id="streakBadge">🔥 0 day streak</div>
    </header>

    <div class="view active" id="view-dashboard">
      <div class="page-header"><h1>Dashboard</h1><p>Your habit command center</p></div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="section-title">Today's Habits</div>
      <div class="today-list" id="todayList"></div>
    </div>

    <div class="view" id="view-habits">
      <div class="page-header">
        <div><h1>My Habits</h1><p>Track, build, conquer</p></div>
        <button class="btn-primary" id="openModalBtn"><i class="bi bi-plus"></i> New Habit</button>
      </div>
      <div class="habits-grid" id="habitsGrid"></div>
    </div>

    <div class="view" id="view-analytics">
      <div class="page-header"><h1>Analytics</h1><p>Visualize your growth</p></div>
      <div class="charts-grid">
        <div class="chart-card"><div class="chart-title">Completions — Last 14 Days</div><canvas id="timelineChart"></canvas></div>
        <div class="chart-card"><div class="chart-title">Per Habit Completions</div><canvas id="habitChart"></canvas></div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">New Habit</h3>
      <button class="modal-close" id="modalClose"><i class="bi bi-x-lg"></i></button>
    </div>
    <form id="habitForm">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Habit Name *</label>
        <input id="habitName" placeholder="e.g. Morning Run" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input id="habitDesc" placeholder="What does this habit do for you?">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Icon</label>
          <select id="habitIcon">
            <option value="⚡">⚡ Energy</option><option value="🏃">🏃 Run</option>
            <option value="📚">📚 Read</option><option value="💧">💧 Water</option>
            <option value="🧘">🧘 Meditate</option><option value="💪">💪 Workout</option>
            <option value="🌙">🌙 Sleep</option><option value="🥗">🥗 Eat Well</option>
          </select>
        </div>
        <div class="form-group">
          <label>Color</label>
          <div class="color-row" id="colorRow">
            <span class="color-dot selected" data-color="#22c55e" style="background:#22c55e"></span>
            <span class="color-dot" data-color="#8b5cf6" style="background:#8b5cf6"></span>
            <span class="color-dot" data-color="#f59e0b" style="background:#f59e0b"></span>
            <span class="color-dot" data-color="#06b6d4" style="background:#06b6d4"></span>
            <span class="color-dot" data-color="#ef4444" style="background:#ef4444"></span>
            <span class="color-dot" data-color="#ec4899" style="background:#ec4899"></span>
          </div>
        </div>
      </div>
      <button type="submit" class="btn-primary w-full" id="submitBtn">Create Habit</button>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
