name: HabitHub CI/CD Pipeline

on:
  push:
    branches:
      - master
      - dev
      - feature/*

  pull_request:
    branches:
      - master

  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/habithub-backend:latest
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/habithub-frontend:latest
  DATABASE_IMAGE: ${{ secrets.DOCKER_USERNAME }}/habithub-db:latest

jobs:
  # =========================================
  # 1. BUILD & TEST
  # =========================================
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend Dependencies
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      # Frontend Dependencies
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      # Backend Tests
      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          npm test || echo "No tests found"

      # Frontend Build Check
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm run build || echo "Frontend build skipped"

  # =========================================
  # 2. DOCKER BUILD & PUSH
  # =========================================
  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend Image
      - name: Build Backend Image
        run: |
          docker build -t $BACKEND_IMAGE ./backend

      - name: Push Backend Image
        run: |
          docker push $BACKEND_IMAGE

      # Frontend Image
      - name: Build Frontend Image
        run: |
          docker build -t $FRONTEND_IMAGE ./frontend

      - name: Push Frontend Image
        run: |
          docker push $FRONTEND_IMAGE

      # Database Image
      - name: Build Database Image
        run: |
          docker build -t $DATABASE_IMAGE ./database

      - name: Push Database Image
        run: |
          docker push $DATABASE_IMAGE

  # =========================================
  # 3. DEPLOY TO AZURE AKS
  # =========================================
  deploy-to-aks:
    needs: docker-build-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # Connect to AKS Cluster
      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group my_k8s_cluster_group \
            --name YOUR_AKS_CLUSTER_NAME \
            --overwrite-existing

      # Deploy Kubernetes Manifests
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      # Restart Deployments
      - name: Restart Kubernetes Deployments
        run: |
          kubectl rollout restart deployment habithub-backend
          kubectl rollout restart deployment habithub-frontend

      # Verify Deployment
      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get services
