<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HabitHub • Gamified Habit Builder</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.75);
      --accent: #22c55e;
    }

    body {
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    .glass {
      backdrop-filter: blur(16px);
      background: var(--card);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 32px rgba(0,0,0,0.4);
    }

    .navbar {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
    }

    .habit-card {
      transition: all 0.3s ease;
    }
    .habit-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }

    .xp-badge {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      padding: 5px 12px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .floating-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      font-size: 28px;
      box-shadow: 0 12px 30px rgba(34, 197, 94, 0.4);
      z-index: 1000;
    }

    canvas {
      max-height: 320px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark px-4 py-3 sticky-top">
    <div class="container-fluid">
      <h3 class="fw-bold mb-0"><i class="bi bi-stars text-success"></i> HabitHub</h3>
      <span class="badge bg-success fs-6">Level Up Your Life 🚀</span>
    </div>
  </nav>

  <div class="container py-4">

    <!-- Quote -->
    <div id="quoteBox" class="glass p-4 text-center mb-4 fw-semibold fs-5"></div>

    <!-- Add Habit -->
    <div class="glass p-4 mb-5">
      <h5 class="mb-3"><i class="bi bi-plus-circle-dotted"></i> Add New Habit</h5>
      <form id="habitForm" class="row g-3">
        <div class="col-md-5">
          <input id="name" class="form-control bg-dark text-light border-0" placeholder="e.g. Drink 3L water" required>
        </div>
        <div class="col-md-5">
          <input id="description" class="form-control bg-dark text-light border-0" placeholder="Description (optional)">
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-success w-100">Add Habit</button>
        </div>
      </form>
    </div>

    <!-- Habits List -->
    <h5 class="mb-3 d-flex align-items-center">
      <i class="bi bi-list-check me-2"></i> My Habits
    </h5>
    <div id="habitsList" class="row g-4"></div>

    <!-- Analytics -->
    <div class="glass p-4 mt-5">
      <h5 class="mb-3"><i class="bi bi-graph-up"></i> Progress Analytics</h5>
      <canvas id="progressChart"></canvas>
    </div>

  </div>

  <!-- Floating Add Button -->
  <button class="btn btn-success floating-btn" onclick="document.getElementById('name').focus()" title="Add new habit">
    <i class="bi bi-plus"></i>
  </button>

  <script>
    let chartInstance = null;

    async function loadQuote() {
      try {
        const res = await fetch('/api/quote');
        const data = await res.json();
        document.getElementById('quoteBox').innerHTML = `💡 ${data.quote}`;
      } catch (e) {
        document.getElementById('quoteBox').innerHTML = `💡 Consistency beats intensity.`;
      }
    }

    async function loadHabits() {
      const container = document.getElementById('habitsList');
      container.innerHTML = '<div class="col-12 text-center py-4"><div class="spinner-border text-success" role="status"></div></div>';

      try {
        const res = await fetch('/api/habits');
        const habits = await res.json();
        container.innerHTML = '';

        let habitData = {};

        for (const h of habits) {
          let completions = 0;
          try {
            const logsRes = await fetch(`/api/logs/${h.id}`);
            const logs = await logsRes.json();
            completions = logs.filter(l => l.completed).length;
          } catch (e) {}

          habitData[h.name] = completions;

          const card = document.createElement('div');
          card.className = 'col-md-6 col-lg-4';
          card.innerHTML = `
            <div class="glass p-4 habit-card h-100">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h6 class="mb-0">${h.name}</h6>
                <span class="xp-badge">${completions * 10} XP</span>
              </div>
              <p class="text-muted small mb-3">${h.description || 'No description provided'}</p>
              <p class="mb-3"><strong>${completions}</strong> completions this period</p>
              <div class="d-flex gap-2">
                <button class="btn btn-outline-success btn-sm flex-grow-1" onclick="logToday('${h.id}')">
                  <i class="bi bi-check2-circle"></i> Log Today
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="deleteHabit('${h.id}')">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>`;

          container.appendChild(card);
        }

        // Render Chart
        renderChart(habitData);

      } catch (error) {
        container.innerHTML = `<div class="col-12 alert alert-danger">Failed to load habits. Make sure the server is running.</div>`;
        console.error(error);
      }
    }

    function renderChart(habitData) {
      if (chartInstance) chartInstance.destroy();

      const ctx = document.getElementById('progressChart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: Object.keys(habitData),
          datasets: [{
            label: 'Completions',
            data: Object.values(habitData),
            backgroundColor: '#22c55e',
            borderColor: '#16a34a',
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { backgroundColor: 'rgba(15,23,42,0.9)' }
          },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
            x: { grid: { color: 'rgba(255,255,255,0.05)' } }
          }
        }
      });
    }

    async function logToday(id) {
      try {
        await fetch('/api/logs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ habitId: id, completed: true })
        });
        loadHabits();
      } catch (e) {
        alert("Couldn't log habit. Is the server running?");
      }
    }

    async function deleteHabit(id) {
      if (!confirm('Delete this habit permanently?')) return;

      try {
        await fetch(`/api/habits/${id}`, { method: 'DELETE' });
        loadHabits();
      } catch (e) {
        alert("Couldn't delete habit.");
      }
    }

    document.getElementById('habitForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const description = document.getElementById('description').value.trim();

      if (!name) return;

      try {
        await fetch('/api/habits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description })
        });
        e.target.reset();
        loadHabits();
      } catch (err) {
        alert("Failed to add habit. Check if backend is running.");
      }
    });
    window.onload = () => {
      loadQuote();
      loadHabits();
      setInterval(loadQuote, 18000);  
    };
  </script>
</body>
</html>
