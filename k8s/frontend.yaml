apiVersion: apps/v1
kind: Deployment
metadata:
  name: habithub-frontend
  namespace: habithub
  labels:
    app: habithub-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: habithub-frontend
  template:
    metadata:
      labels:
        app: habithub-frontend
    spec:
      containers:
        - name: frontend
          image: hasnat163/habithub-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: habithub-frontend
  namespace: habithub
spec:
  selector:
    app: habithub-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
