apiVersion: apps/v1
kind: Deployment
metadata:
  name: habithub-backend
  namespace: habithub
  labels:
    app: habithub-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: habithub-backend
  template:
    metadata:
      labels:
        app: habithub-backend
    spec:
      containers:
        - name: backend
          image: hasnat163/habithub-backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: habithub-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: habithub-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: habithub-backend
  namespace: habithub
spec:
  selector:
    app: habithub-backend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
